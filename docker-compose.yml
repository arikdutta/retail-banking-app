services:
  backend:
    image: ${DOCKER_USERNAME}/${DOCKER_REPOSITORY}:backend-${IMAGE_TAG}
    environment:
      DATABASE_URL: "postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DATABASE}"
      JWT_SECRET: ${JWT_SECRET}
      CORS_ORIGINS: ${CORS_ORIGINS}
      APP_ENV: production
      RUST_LOG: info
    ports:
      # 127.0.0.1 binding: host nginx proxies, prevents direct external access
      - "127.0.0.1:5001:3001"
    depends_on:
      db:
        condition: service_healthy
    restart: always
    networks:
      - app-network

  frontend:
    image: ${DOCKER_USERNAME}/${DOCKER_REPOSITORY}:frontend-${IMAGE_TAG}
    environment:
      NODE_ENV: production
      API_URL: http://backend:3001
    ports:
      - "127.0.0.1:5002:3000"
    restart: always
    networks:
      - app-network

  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DATABASE}
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DATABASE}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network

volumes:
  db_data:
    driver: local

networks:
  app-network:
    driver: bridge
