name: Build and Deploy — retail-banking-app

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  # gh workflow run prod.yml
  # gh workflow run prod.yml -f skip_build=true   ← redeploy only
  workflow_dispatch:
    inputs:
      skip_build:
        description: 'Skip all builds and redeploy current images'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'
      skip_backend:
        description: 'Skip backend build'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'
      skip_frontend:
        description: 'Skip frontend build'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

jobs:
  build-backend:
    runs-on: ubuntu-latest
    if: github.event.inputs.skip_build != 'true' && github.event.inputs.skip_backend != 'true'
    outputs:
      image_tag: ${{ steps.tag.outputs.sha }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Generate image tag
        id: tag
        run: echo "sha=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Build and push backend image
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./Dockerfile.backend
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/${{ vars.DOCKER_REPOSITORY }}:backend-${{ steps.tag.outputs.sha }}
            ${{ secrets.DOCKER_USERNAME }}/${{ vars.DOCKER_REPOSITORY }}:backend-latest
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

  build-frontend:
    runs-on: ubuntu-latest
    if: github.event.inputs.skip_build != 'true' && github.event.inputs.skip_frontend != 'true'
    outputs:
      image_tag: ${{ steps.tag.outputs.sha }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Generate image tag
        id: tag
        run: echo "sha=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Build and push frontend image
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./Dockerfile.frontend
          push: true
          build-args: |
            VITE_API_URL=${{ vars.VITE_API_URL }}
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/${{ vars.DOCKER_REPOSITORY }}:frontend-${{ steps.tag.outputs.sha }}
            ${{ secrets.DOCKER_USERNAME }}/${{ vars.DOCKER_REPOSITORY }}:frontend-latest
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

  deploy:
    needs: [build-backend, build-frontend]
    if: always() && (needs.build-backend.result == 'success' || needs.build-backend.result == 'skipped') && (needs.build-frontend.result == 'success' || needs.build-frontend.result == 'skipped')
    runs-on: ubuntu-latest

    env:
      SSH: ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no root@${{ vars.SERVER_IP }}
      SCP: scp -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no
      APP_DIR: ~/retail-banking-app

    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ vars.SERVER_IP }} >> ~/.ssh/known_hosts

      - name: Create app dir on server
        run: ${{ env.SSH }} "mkdir -p ${{ env.APP_DIR }}"

      - name: Copy docker-compose to server
        run: ${{ env.SCP }} docker-compose.yml root@${{ vars.SERVER_IP }}:${{ env.APP_DIR }}/docker-compose.yml

      - name: Update nginx config
        run: |
          ${{ env.SCP }} nginx.conf root@${{ vars.SERVER_IP }}:/etc/nginx/nginx.conf
          ${{ env.SSH }} "nginx -t && nginx -s reload"

      - name: Write .env on server
        run: |
          ${{ env.SSH }} "
            CURRENT_TAG=\$(grep '^IMAGE_TAG=' ${{ env.APP_DIR }}/.env 2>/dev/null | cut -d= -f2- || true)
            NEW_TAG='${{ needs.build-backend.outputs.image_tag }}'
            IMAGE_TAG=\${NEW_TAG:-\$CURRENT_TAG}
            cat > ${{ env.APP_DIR }}/.env << ENVEOF
          DOCKER_USERNAME=${{ secrets.DOCKER_USERNAME }}
          DOCKER_REPOSITORY=${{ vars.DOCKER_REPOSITORY }}
          POSTGRES_USER=${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
          POSTGRES_DATABASE=${{ secrets.POSTGRES_DATABASE }}
          JWT_SECRET=${{ secrets.JWT_SECRET }}
          CORS_ORIGINS=${{ vars.CORS_ORIGINS }}
          VITE_API_URL=${{ vars.VITE_API_URL }}
          IMAGE_TAG=\$IMAGE_TAG
          ENVEOF
          "

      - name: Docker login on server
        run: ${{ env.SSH }} "echo '${{ secrets.DOCKER_PASSWORD }}' | docker login -u '${{ secrets.DOCKER_USERNAME }}' --password-stdin"

      - name: Pull and restart containers
        run: |
          ${{ env.SSH }} "
            cd ${{ env.APP_DIR }}
            docker compose down
            docker compose pull
            docker compose up -d db
            until docker exec retail-banking-app-db-1 pg_isready -U ${{ secrets.POSTGRES_USER }}; do sleep 2; done
            docker compose up -d
          "

      - name: Smoke test
        run: |
          sleep 5
          ${{ env.SSH }} "curl -sf http://localhost:5001/health || (cd ${{ env.APP_DIR }} && docker compose logs backend --tail=20 && exit 1)"

      - name: Cleanup old images
        run: ${{ env.SSH }} "docker image prune -af"
